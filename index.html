<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: black; }
        canvas { border: 1px solid white; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle and ball
        const paddleWidth = 10, paddleHeight = 100;
        const ballSize = 10;
        let player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white' };
        let computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'red' };
        let ball = { x: canvas.width / 2, y: canvas.height / 2, radius: ballSize, speed: 5, dx: 5, dy: 5, color: 'blue' };
        let score = { player: 0, computer: 0 };

        function draw() {
            // Clear the canvas
            context.fillStyle = 'black';
            context.fillRect(0, 0, canvas.width, canvas.height);
            // Draw paddles and ball
            context.fillStyle = player.color;
            context.fillRect(player.x, player.y, player.width, player.height);
            context.fillStyle = computer.color;
            context.fillRect(computer.x, computer.y, computer.width, computer.height);
            context.fillStyle = ball.color;
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
            // Draw score
            context.fillStyle = 'white';
            context.font = '20px Arial';
            context.fillText(score.player, canvas.width / 4, canvas.height / 5);
            context.fillText(score.computer, 3 * canvas.width / 4, canvas.height / 5);
        }

        function update() {
            // Move the computer paddle
            const computerLevel = 0.1;
            computer.y += (ball.y - (computer.y + computer.height / 2)) * computerLevel;
            // Move the ball
            ball.x += ball.dx;
            ball.y += ball.dy;
            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }
            // Ball collision with paddles
            if (ball.x - ball.radius < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.dx *= -1;
            }
            if (ball.x + ball.radius > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height) {
                ball.dx *= -1;
            }
            // Ball out of bounds
            if (ball.x - ball.radius < 0) {
                score.computer++; 
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                score.player++; 
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = -ball.dx;
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        function control(event) {
            const mouseY = event.clientY - canvas.getBoundingClientRect().top;
            if (mouseY > 0 && mouseY < canvas.height) {
                player.y = mouseY - player.height / 2;
            }
        }

        document.addEventListener('mousemove', control);
        document.addEventListener('keydown', event => {
            if (event.key === "ArrowUp" && player.y > 0) player.y -= 20;
            if (event.key === "ArrowDown" && player.y + player.height < canvas.height) player.y += 20;
        });

        gameLoop();
    </script>
</body>
</html>
